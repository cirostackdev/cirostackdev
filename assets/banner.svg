<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes rain {
        0% { transform: translateY(-100%); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(300px); opacity: 0; }
      }
      .title {
        font-family: 'Courier New', monospace;
        font-size: 48px;
        font-weight: bold;
        fill: #00ff88;
        filter: drop-shadow(0 0 10px #00ff88) drop-shadow(0 0 20px #00ff8844);
        animation: flicker 3s ease-in-out infinite;
      }
      .cursor {
        fill: #00ff88;
        animation: blink 1s step-end infinite;
      }
      .subtitle {
        font-family: 'Courier New', monospace;
        font-size: 20px;
        fill: #7ee787;
        opacity: 0.8;
      }
      .rain-char {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #00ff88;
        opacity: 0.15;
      }
      .rain-1 { animation: rain 4s linear infinite; }
      .rain-2 { animation: rain 5s linear infinite 0.5s; }
      .rain-3 { animation: rain 3.5s linear infinite 1s; }
      .rain-4 { animation: rain 4.5s linear infinite 1.5s; }
      .rain-5 { animation: rain 3s linear infinite 2s; }
      .rain-6 { animation: rain 5.5s linear infinite 0.3s; }
      .rain-7 { animation: rain 4.2s linear infinite 1.2s; }
      .rain-8 { animation: rain 3.8s linear infinite 0.8s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#0d1117"/>

  <!-- Grid lines -->
  <line x1="0" y1="75" x2="1200" y2="75" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="150" x2="1200" y2="150" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="225" x2="1200" y2="225" stroke="#161b22" stroke-width="1"/>

  <!-- Code rain characters -->
  <text class="rain-char rain-1" x="50" y="20">01101</text>
  <text class="rain-char rain-2" x="150" y="40">const</text>
  <text class="rain-char rain-3" x="280" y="10">async</text>
  <text class="rain-char rain-4" x="400" y="50">=&gt;{}</text>
  <text class="rain-char rain-5" x="520" y="30">import</text>
  <text class="rain-char rain-6" x="680" y="15">torch</text>
  <text class="rain-char rain-7" x="820" y="45">build</text>
  <text class="rain-char rain-8" x="950" y="25">deploy</text>
  <text class="rain-char rain-2" x="1050" y="35">10110</text>
  <text class="rain-char rain-4" x="100" y="60">model</text>
  <text class="rain-char rain-6" x="750" y="55">fetch</text>
  <text class="rain-char rain-1" x="600" y="5">npm</text>
  <text class="rain-char rain-3" x="1100" y="50">def</text>

  <!-- Main title -->
  <text class="title" x="50%" y="140" text-anchor="middle">cirostackdev</text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="748" y="112" width="16" height="40" rx="2"/>

  <!-- Subtitle -->
  <text class="subtitle" x="50%" y="190" text-anchor="middle">Full-Stack Engineer | AI Builder | Founder</text>

  <!-- Bottom border glow -->
  <rect y="296" width="1200" height="4" fill="#00ff88" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
